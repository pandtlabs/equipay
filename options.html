<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>equiPay — Complainant Info</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        max-width: 560px;
        margin: 32px auto;
        padding: 0 24px;
        color: #222;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 4px;
      }
      p.lede {
        color: #555;
        margin-top: 0;
        font-size: 14px;
      }
      fieldset {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 16px;
        margin: 16px 0;
      }
      legend {
        font-weight: 600;
        padding: 0 6px;
      }
      label {
        display: block;
        font-size: 13px;
        margin-top: 10px;
        color: #333;
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        font-size: 14px;
        border: 1px solid #bbb;
        border-radius: 4px;
        margin-top: 3px;
      }
      .row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        gap: 10px;
      }
      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 12px;
      }
      button {
        padding: 8px 14px;
        font-size: 14px;
        border-radius: 4px;
        border: 1px solid #2a6df4;
        background: #2a6df4;
        color: white;
        cursor: pointer;
      }
      button.secondary {
        background: white;
        color: #2a6df4;
      }
      #status {
        font-size: 13px;
        color: #2a6df4;
      }
    </style>
  </head>
  <body>
    <h1>equiPay — Your Info</h1>
    <p class="lede">
      Stored locally in your browser (via <code>chrome.storage.local</code>) and
      used to pre-fill the Claimant section of the NYS DOL complaint form. Never
      sent anywhere else.
    </p>

    <form id="form">
      <fieldset>
        <legend>Name &amp; Contact</legend>
        <label
          >First name
          <input type="text" name="firstName" required />
        </label>
        <label
          >Last name
          <input type="text" name="lastName" required />
        </label>
        <label
          >Email
          <input type="email" name="email" />
        </label>
        <label
          >Phone
          <input type="tel" name="phone" />
        </label>
      </fieldset>

      <fieldset>
        <legend>Mailing Address</legend>
        <label
          >Address line 1
          <input type="text" name="address1" />
        </label>
        <label
          >Address line 2
          <input type="text" name="address2" />
        </label>
        <div class="row">
          <label
            >City
            <input type="text" name="city" />
          </label>
          <label
            >State
            <input type="text" name="state" value="NY" />
          </label>
          <label
            >ZIP
            <input type="text" name="zip" />
          </label>
        </div>
        <label
          >County
          <input type="text" name="county" />
        </label>
      </fieldset>

      <div class="actions">
        <button type="submit">Save</button>
        <button type="button" class="secondary" id="clear">Clear</button>
        <span id="status"></span>
      </div>
    </form>

    <script src="options.js"></script>
  </body>
</html>
